name: Eli Heartbeat

# GitHub Actions 用的是 UTC 时间。下面三个时间换算成北京时间是：
#   09:30 / 14:30 / 21:30  （即 UTC 的 01:30 / 06:30 / 13:30）
# 想改时间就改下面的 cron，格式是 "分 时 * * *"（时是 UTC，记得 -8 小时）。
on:
  schedule:
    - cron: '30 1 * * *'    # 北京 09:30
    - cron: '0 4 * * *'     # 北京 12:00
    - cron: '30 6 * * *'    # 北京 14:30
    - cron: '0 9 * * *'     # 北京 17:00
    - cron: '30 11 * * *'   # 北京 19:30
    - cron: '0 14 * * *'    # 北京 22:00
    - cron: '0 16 * * *'    # 北京 00:00（次日）
    - cron: '0 18 * * *'    # 北京 02:00
    - cron: '0 20 * * *'    # 北京 04:00
  workflow_dispatch:   # 允许你在 GitHub 网页上手动点一下，立刻测试

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: 取出代码
        uses: actions/checkout@v4

      - name: 装好 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 跑心跳
        run: python heartbeat.py
        env:
          GATEWAY_URL: ${{ secrets.GATEWAY_URL }}
          GATEWAY_KEY: ${{ secrets.GATEWAY_KEY }}
          MODEL: ${{ secrets.MODEL }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
